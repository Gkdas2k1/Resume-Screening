<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Screener</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        input[type="file"] {
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .results {
            margin-top: 20px;
        }
        .candidate {
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>AI Resume Screener</h1>
    
    <div class="section">
        <h2>Upload Resumes</h2>
        <input type="file" id="resumeFiles" multiple accept=".pdf,.docx,.txt">
        <button id="uploadBtn">Upload</button>
        <div id="uploadStatus"></div>
    </div>

    <div class="section">
        <h2>Job Description</h2>
        <textarea id="jobDescription" placeholder="Enter the job description here..."></textarea>
        <label for="topN">Top N Candidates: </label>
        <input type="number" id="topN" value="5" min="1">
        <button id="matchBtn">Match Candidates</button>
    </div>

    <div class="section">
        <h2>Results</h2>
        <div id="results"></div>
    </div>

    <script>
        let uploadedFiles = [];

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const files = document.getElementById('resumeFiles').files;
            const formData = new FormData();
            
            for (let i = 0; i < files.length; i++) {
                formData.append('files', files[i]);
            }

            try {
                const response = await fetch('/upload-resumes', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    uploadedFiles = data.filenames;
                    document.getElementById('uploadStatus').innerHTML = 
                        `<p style="color: green;">Successfully uploaded ${uploadedFiles.length} files: ${uploadedFiles.join(', ')}</p>`;
                } else {
                    document.getElementById('uploadStatus').innerHTML = 
                        `<p style="color: red;">Upload failed</p>`;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('uploadStatus').innerHTML = 
                    `<p style="color: red;">Error: ${error.message}</p>`;
            }
        });

        document.getElementById('matchBtn').addEventListener('click', async () => {
            const jobDescription = document.getElementById('jobDescription').value;
            const topN = document.getElementById('topN').value;
            const formData = new FormData();
            formData.append('job_description', jobDescription);
            formData.append('top_n', topN);

            try {
                const response = await fetch('/match-candidates', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    let resultsHtml = '<div class="results">';
                    
                    data.top_candidates.forEach((candidate, index) => {
                        resultsHtml += `
                            <div class="candidate">
                                <h3>${index + 1}. ${candidate.filename}</h3>
                                <p>Score: ${(candidate.score * 100).toFixed(2)}%</p>
                                <p>Matched Keywords: ${candidate.matched_keywords.join(', ')}</p>
                            </div>
                        `;
                    });
                    
                    resultsHtml += '</div>';
                    document.getElementById('results').innerHTML = resultsHtml;
                } else {
                    document.getElementById('results').innerHTML = 
                        `<p style="color: red;">Matching failed</p>`;
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('results').innerHTML = 
                    `<p style="color: red;">Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
